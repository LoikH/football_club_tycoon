<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 500" width="630" height="500">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#143018"/>
      <stop offset="70%" stop-color="#070c08"/>
      <stop offset="100%" stop-color="#020402"/>
    </radialGradient>
    
    <!-- Neon Colors -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="neon-magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00ea"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#00aa22"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="630" height="500" fill="url(#bg-glow)"/>
  
  <!-- Soccer Pitch Lines in Background -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="2" fill="none">
    <rect x="20" y="20" width="590" height="460"/>
    <line x1="315" y1="20" x2="315" y2="480"/>
    <circle cx="315" cy="250" r="80"/>
    <circle cx="315" cy="250" r="4"/>
    <!-- Goal areas -->
    <rect x="20" y="160" width="60" height="180"/>
    <rect x="550" y="160" width="60" height="180"/>
  </g>
  
  <!-- Grid Matrix Dots for Cyber Theme -->
  <g opacity="0.15" fill="#39ff14">
    <circle cx="50" cy="50" r="1"/><circle cx="100" cy="50" r="1"/><circle cx="150" cy="50" r="1"/><circle cx="200" cy="50" r="1"/><circle cx="250" cy="50" r="1"/><circle cx="300" cy="50" r="1"/><circle cx="350" cy="50" r="1"/><circle cx="400" cy="50" r="1"/><circle cx="450" cy="50" r="1"/><circle cx="500" cy="50" r="1"/><circle cx="550" cy="50" r="1"/><circle cx="600" cy="50" r="1"/>
    <circle cx="50" cy="150" r="1"/><circle cx="600" cy="150" r="1"/>
    <circle cx="50" cy="250" r="1"/><circle cx="600" cy="250" r="1"/>
    <circle cx="50" cy="350" r="1"/><circle cx="600" cy="350" r="1"/>
    <circle cx="50" cy="450" r="1"/><circle cx="100" cy="450" r="1"/><circle cx="150" cy="450" r="1"/><circle cx="200" cy="450" r="1"/><circle cx="250" cy="450" r="1"/><circle cx="300" cy="450" r="1"/><circle cx="350" cy="450" r="1"/><circle cx="400" cy="450" r="1"/><circle cx="450" cy="450" r="1"/><circle cx="500" cy="450" r="1"/><circle cx="550" cy="450" r="1"/><circle cx="600" cy="450" r="1"/>
  </g>

  <!-- DECORATIVE NEON LIGHT BEAMS -->
  <path d="M-50,150 L200,-50" stroke="url(#neon-magenta)" stroke-width="2" opacity="0.4" filter="url(#glow-cyan)"/>
  <path d="M400,550 L680,250" stroke="url(#neon-cyan)" stroke-width="3" opacity="0.3" filter="url(#glow-cyan)"/>

  <!-- CENTRAL ILLUSTRATION: DYNAMIC GRAPHICS -->
  <g transform="translate(0, 40)">
    <!-- Behind Cards: Glowing Neon Stadium Cutout -->
    <g transform="translate(315, 230) scale(0.65)" filter="url(#shadow)">
      <!-- Stadium Outer Ring -->
      <ellipse cx="0" cy="0" rx="190" ry="140" fill="#0f1110" stroke="url(#neon-cyan)" stroke-width="6" filter="url(#glow-cyan)"/>
      <ellipse cx="0" cy="0" rx="170" ry="120" fill="none" stroke="#222" stroke-width="4"/>
      <!-- Stands / Rows -->
      <ellipse cx="0" cy="0" rx="145" ry="98" fill="none" stroke="#e65c00" stroke-width="12" opacity="0.85"/>
      <ellipse cx="0" cy="0" rx="125" ry="80" fill="none" stroke="#ff9900" stroke-width="8" opacity="0.85"/>
      <!-- Pitch Field -->
      <ellipse cx="0" cy="0" rx="105" ry="65" fill="#1b6a22"/>
      <!-- Field Markings -->
      <ellipse cx="0" cy="0" rx="90" ry="52" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
      <line x1="0" y1="-52" x2="0" y2="52" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
      <ellipse cx="0" cy="0" rx="25" ry="25" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
      <!-- Roof Canopy Light Ring -->
      <ellipse cx="0" cy="-5" rx="180" ry="132" fill="none" stroke="#ffffff" stroke-width="6" filter="url(#glow-gold)" opacity="0.95"/>
    </g>

    <!-- FLOATING COLLECTIBLE TRADING CARDS (3D ANGLED) -->
    
    <!-- LEFT CARD: CYAN (Bellingham / Midfielder) -->
    <g transform="translate(130, 240) rotate(-14) scale(0.72)" filter="url(#shadow)">
      <rect x="0" y="0" width="150" height="210" rx="12" fill="#0b1318" stroke="url(#neon-cyan)" stroke-width="4" filter="url(#glow-cyan)"/>
      <rect x="8" y="8" width="134" height="194" rx="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="75" y="32" fill="#00ffff" font-family="'Montserrat', sans-serif" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">EPIC</text>
      <!-- Portrait Silhouette -->
      <circle cx="75" cy="95" r="30" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="4,4"/>
      <text x="75" y="105" fill="#00ffff" font-family="sans-serif" font-size="28" text-anchor="middle">👑</text>
      <!-- Details -->
      <text x="75" y="152" fill="#ffffff" font-family="'Montserrat', sans-serif" font-size="13" font-weight="900" text-anchor="middle">J. BELLINGHAM</text>
      <text x="75" y="172" fill="#39ff14" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">+30% BOOST</text>
      <text x="75" y="190" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="8" text-anchor="middle">Lv. 5 (MAX)</text>
    </g>

    <!-- RIGHT CARD: MAGENTA (Mbappé / Forward) -->
    <g transform="translate(490, 240) rotate(14) scale(0.72)" filter="url(#shadow)">
      <rect x="-150" y="0" width="150" height="210" rx="12" fill="#140b18" stroke="url(#neon-magenta)" stroke-width="4" filter="url(#glow-cyan)"/>
      <rect x="-142" y="8" width="134" height="194" rx="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="-75" y="32" fill="#ff00ea" font-family="'Montserrat', sans-serif" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">LEGENDARY</text>
      <!-- Portrait Silhouette -->
      <circle cx="-75" cy="95" r="30" fill="none" stroke="#ff00ea" stroke-width="2" stroke-dasharray="4,4"/>
      <text x="-75" y="105" fill="#ff00ea" font-family="sans-serif" font-size="28" text-anchor="middle">🚀</text>
      <!-- Details -->
      <text x="-75" y="152" fill="#ffffff" font-family="'Montserrat', sans-serif" font-size="13" font-weight="900" text-anchor="middle">K. MBAPPÉ</text>
      <text x="-75" y="172" fill="#39ff14" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">+45% BOOST</text>
      <text x="-75" y="190" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="8" text-anchor="middle">Lv. 3</text>
    </g>

    <!-- MIDDLE FRONT CARD: GOLD (Ronaldinho / Mythic Secret) -->
    <g transform="translate(315, 255) translate(-85, -119) scale(0.85)" filter="url(#shadow)">
      <!-- Animated Gold Glowing Frame -->
      <rect x="0" y="0" width="170" height="238" rx="14" fill="#131105" stroke="url(#neon-gold)" stroke-width="5" filter="url(#glow-gold)"/>
      <rect x="8" y="8" width="154" height="222" rx="10" fill="none" stroke="rgba(255,214,0,0.25)" stroke-width="2"/>
      <!-- Card Tags -->
      <rect x="45" y="16" width="80" height="16" rx="8" fill="url(#neon-gold)" filter="url(#glow-gold)"/>
      <text x="85" y="28" fill="#000000" font-family="'Montserrat', sans-serif" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="1.5">MYTHIC</text>
      <text x="145" y="32" fill="#ffea00" font-family="'Montserrat', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STAR</text>
      <!-- Portrait Frame -->
      <circle cx="85" cy="100" r="38" fill="rgba(255,214,0,0.05)" stroke="url(#neon-gold)" stroke-width="2" stroke-dasharray="6,3"/>
      <!-- Portrait Emoji -->
      <text x="85" y="112" font-family="sans-serif" font-size="42" text-anchor="middle">🤙</text>
      <!-- Hologram Glow Lines Overlay -->
      <line x1="20" y1="70" x2="150" y2="70" stroke="rgba(255,234,0,0.15)" stroke-width="1" stroke-dasharray="10,5"/>
      <line x1="20" y1="130" x2="150" y2="130" stroke="rgba(255,234,0,0.15)" stroke-width="1" stroke-dasharray="5,10"/>
      <!-- Metadata -->
      <text x="85" y="168" fill="#ffffff" font-family="'Montserrat', sans-serif" font-size="16" font-weight="900" text-anchor="middle" letter-spacing="0.5">RONALDINHO</text>
      <text x="85" y="190" fill="#39ff14" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow-green)">+120% JOGA BOOST</text>
      <!-- Stars -->
      <text x="85" y="214" fill="#ffea00" font-family="sans-serif" font-size="12" text-anchor="middle">★★★★★</text>
    </g>
  </g>

  <!-- FLOATING CASH COINS & GOLD DUST EFFECT -->
  <g filter="url(#shadow)">
    <!-- Golden Coins -->
    <circle cx="80" cy="380" r="14" fill="url(#neon-gold)" stroke="#fff" stroke-width="1"/>
    <text x="80" y="385" fill="#000" font-family="sans-serif" font-weight="900" font-size="14" text-anchor="middle">$</text>
    
    <circle cx="560" cy="120" r="11" fill="url(#neon-gold)" stroke="#fff" stroke-width="1" transform="rotate(15, 560, 120)"/>
    <text x="560" y="124" fill="#000" font-family="sans-serif" font-weight="900" font-size="11" text-anchor="middle">$</text>

    <circle cx="490" cy="390" r="15" fill="url(#neon-gold)" stroke="#fff" stroke-width="1.5" transform="rotate(-20, 490, 390)"/>
    <text x="490" y="395" fill="#000" font-family="sans-serif" font-weight="900" font-size="15" text-anchor="middle">$</text>
    
    <!-- Neon particles -->
    <circle cx="210" cy="330" r="3" fill="#39ff14" filter="url(#glow-green)"/>
    <circle cx="420" cy="130" r="4" fill="#00ffff" filter="url(#glow-cyan)"/>
    <circle cx="160" cy="110" r="3" fill="#ff00ea" filter="url(#glow-cyan)"/>
    <polygon points="100,180 105,190 100,200 95,190" fill="#ffea00"/>
    <polygon points="530,310 534,316 530,322 526,316" fill="#00ffff"/>
  </g>

  <!-- TITLE TYPOGRAPHY HEADER (UPPER HALF LAYER) -->
  <g transform="translate(315, 75)" text-anchor="middle" filter="url(#shadow)">
    <!-- Glow behind Title -->
    <text x="0" y="0" fill="none" stroke="#00ffff" stroke-width="15" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="34" letter-spacing="3" opacity="0.35" filter="url(#glow-cyan)">FOOTBALL CLUB</text>
    <!-- Main "FOOTBALL CLUB" lettrage -->
    <text x="0" y="0" fill="#ffffff" stroke="url(#neon-cyan)" stroke-width="2.5" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="34" letter-spacing="3">FOOTBALL CLUB</text>
    
    <!-- Giant 3D Extruded "TYCOON" letters -->
    <g transform="translate(0, 48)">
      <!-- 3D Extrusion Shadows -->
      <text x="0" y="2" fill="#7a4b00" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="64" letter-spacing="6" skewX="-10">TYCOON</text>
      <text x="0" y="4" fill="#543100" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="64" letter-spacing="6" skewX="-10">TYCOON</text>
      <text x="0" y="6" fill="#301a00" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="64" letter-spacing="6" skewX="-10">TYCOON</text>
      <!-- Front Gold Glowing face -->
      <text x="0" y="0" fill="url(#neon-gold)" stroke="#ffffff" stroke-width="1.5" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="64" letter-spacing="6" skewX="-10" filter="url(#glow-gold)">TYCOON</text>
    </g>

    <!-- Subtitle Ribbon "ROAD TO BILLIONAIRE" -->
    <g transform="translate(0, 85)">
      <!-- Banner background -->
      <rect x="-140" y="-12" width="280" height="22" rx="4" fill="#000" stroke="url(#neon-gold)" stroke-width="1.5"/>
      <text x="0" y="3" fill="#ffea00" font-family="'Montserrat', sans-serif" font-size="10" font-weight="bold" letter-spacing="2">ROAD TO BILLIONAIRE</text>
    </g>
    
    <!-- Ultimate Edition Tag -->
    <text x="0" y="110" fill="#39ff14" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="4" filter="url(#glow-green)">★ ULTIMATE EDITION ★</text>
  </g>
</svg>
